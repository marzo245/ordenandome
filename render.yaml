# Blueprint de Render. Importa este repo en Render > "New + > Blueprint".
# El cron del resumen diario está en cron-job.org (Render quitó el plan free
# para cron jobs). Allí configuras un GET a $APP_URL/api/summary con header
# "Authorization: Bearer $CRON_SECRET".
services:
  - type: web
    name: calendario-inteligente
    runtime: node
    plan: free
    branch: main
    autoDeploy: true
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: DATABASE_URL
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_USERNAME
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: CRON_SECRET
        generateValue: true
